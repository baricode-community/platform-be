services:
  baricode_redis:
    image: redis
    container_name: baricode_redis
    ports:
      - "6379:6379"
    volumes:
      - baricode_redis:/data
  baricode_mysql:
    image: mysql
    container_name: baricode_mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: baricode_db
      MYSQL_USER: baricode_user
      MYSQL_PASSWORD: userpassword
    ports:
      - "3306:3306"
    volumes:
      - baricode_mysql:/var/lib/mysql

volumes:
  baricode_redis:
    driver: local
  baricode_mysql:
    driver: local