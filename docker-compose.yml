services:
  redis:
    image: redis
    container_name: baricode_redis
    ports:
      - "6379:6379"
    volumes:
      - redis:/data
  mysql:
    image: mysql
    container_name: baricode_mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: baricode_db
      MYSQL_USER: baricode_user
      MYSQL_PASSWORD: userpassword
    ports:
      - "3306:3306"
    volumes:
      - mysql:/var/lib/mysql
  # baricode_app:
  #     build: .
  #     container_name: baricode_app
  #     ports:
  #       - "8000:80"
  #     env_file:
  #       - .env
  #     depends_on:
  #       - redis
  #       - mysql

volumes:
  redis:
    driver: local
  mysql:
    driver: local